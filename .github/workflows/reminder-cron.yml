name: Solo Leveling Reminder Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install @emailjs/nodejs node-fetch@2
      - run: node send-reminders.js
        env:
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          EMAILJS_PUBLIC_KEY: ${{ secrets.EMAILJS_PUBLIC_KEY }}
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
          EMAILJS_SERVICE_ID: ${{ secrets.EMAILJS_SERVICE_ID }}
          EMAILJS_REMINDER_TEMPLATE_ID: ${{ secrets.EMAILJS_REMINDER_TEMPLATE_ID }}
          EMAILJS_DAILY_TEMPLATE_ID: ${{ secrets.EMAILJS_DAILY_TEMPLATE_ID }}
          TIMEZONE: 'Asia/Makassar'